<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Duckling</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a2e;
      color: #e8e8f0;
      width: 320px;
      padding: 20px;
    }

    h2 {
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #888aaa;
      margin-bottom: 12px;
      text-align: center;
    }

    ol {
      list-style: none;
      counter-reset: steps;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    ol li {
      counter-increment: steps;
      padding-left: 30px;
      position: relative;
      font-size: 13px;
      line-height: 1.6;
      color: #c8c8dc;
    }

    ol li::before {
      content: counter(steps);
      position: absolute;
      left: 0;
      top: 2px;
      width: 20px;
      height: 20px;
      background: #f5c842;
      color: #1a1a2e;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
    }

    code {
      background: #2a2a44;
      border: 1px solid #3a3a5a;
      border-radius: 4px;
      padding: 1px 5px;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      font-size: 12px;
      color: #f5c842;
    }
  </style>
</head>
<body>
  <h2>Usage</h2>
  <ol>
    <li>In the address bar, type exclamation mark, then space (<code>! </code>).</li>
    <li>Start typing a bang (e.g. <code>g</code>) and pick from live suggestions.</li>
    <li>Add your query and press <code>Enter</code> to jump directly to the target site.</li>
  </ol>
</body>
</html>
